<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">GAMB Logo</title>
  <desc id="desc">Logo tech minimalista com desenho visível de um gambá.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="104" fill="url(#bg)"/>

  <g stroke="url(#accent)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M70 150h70"/>
    <path d="M372 150h70"/>
    <path d="M56 256h58"/>
    <path d="M398 256h58"/>
    <path d="M88 360h72"/>
    <path d="M352 360h72"/>
  </g>
  <g fill="#67e8f9">
    <circle cx="140" cy="150" r="8"/>
    <circle cx="372" cy="150" r="8"/>
    <circle cx="114" cy="256" r="8"/>
    <circle cx="398" cy="256" r="8"/>
    <circle cx="160" cy="360" r="8"/>
    <circle cx="352" cy="360" r="8"/>
  </g>

  <!-- Orelhas -->
  <path d="M178 162l-40-62c-7-11 4-25 17-21l58 20z" fill="#0f172a"/>
  <path d="M334 162l40-62c7-11-4-25-17-21l-58 20z" fill="#0f172a"/>
  <path d="M184 145l-23-36c-4-6 2-14 9-12l34 12z" fill="#f8fafc"/>
  <path d="M328 145l23-36c4-6-2-14-9-12l-34 12z" fill="#f8fafc"/>

  <!-- Cabeça do gambá -->
  <ellipse cx="256" cy="262" rx="132" ry="120" fill="#111827"/>

  <!-- Faixa branca característica -->
  <path d="M226 120c19-7 41-7 60 0v250c-9 4-19 6-30 6s-21-2-30-6z" fill="#f8fafc"/>

  <!-- Máscara facial -->
  <path d="M160 260c0-44 33-78 79-78h34c46 0 79 34 79 78 0 49-36 88-82 88h-22c-46 0-88-39-88-88z" fill="#0b1220"/>

  <!-- Olhos -->
  <ellipse cx="216" cy="258" rx="20" ry="24" fill="#f8fafc"/>
  <ellipse cx="296" cy="258" rx="20" ry="24" fill="#f8fafc"/>
  <circle cx="216" cy="262" r="10" fill="#0f172a"/>
  <circle cx="296" cy="262" r="10" fill="#0f172a"/>
  <circle cx="219" cy="258" r="3" fill="#e2e8f0"/>
  <circle cx="299" cy="258" r="3" fill="#e2e8f0"/>

  <!-- Nariz e boca -->
  <path d="M244 300c0-8 6-14 12-14s12 6 12 14-6 13-12 13-12-5-12-13z" fill="#111827"/>
  <path d="M256 314v16" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <path d="M256 330c-11 0-20 6-24 14" stroke="#111827" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M256 330c11 0 20 6 24 14" stroke="#111827" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Texto -->
  <text x="256" y="468" text-anchor="middle" fill="#67e8f9" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="8">GAMB</text>
</svg>
