<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Monitor Protheus</title>
</head>
<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">Monitor de Ambientes Protheus</h1>

<div id="services" class="grid gap-6"></div>

<script>
function getColor(status){
    if(status === "RUNNING") return "text-green-600";
    if(status === "STOPPED") return "text-red-600";
    if(status === "NOT FOUND") return "text-gray-500";
    return "text-yellow-600";
}

function loadServices(){
    fetch('/status')
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById("services");
        container.innerHTML = "";

        data.forEach(env => {

            let html = `
                <div class="bg-gray-200 p-4 rounded shadow">
                    <h2 class="text-lg font-bold mb-3">${env.environment}</h2>
            `;

            env.services.forEach(s => {
                html += `
                    <div class="bg-white p-3 mb-2 rounded flex justify-between items-center">
                        <div>
                            <div class="font-semibold">${s.name}</div>
                            <div class="${getColor(s.status)}">${s.status}</div>
                        </div>

                        <div class="space-x-2">
                            <button onclick="sendAction('${s.name}','start')" class="bg-green-500 text-white px-3 py-1 rounded">Start</button>
                            <button onclick="sendAction('${s.name}','stop')" class="bg-red-500 text-white px-3 py-1 rounded">Stop</button>
                            <button onclick="sendAction('${s.name}','restart')" class="bg-yellow-500 text-white px-3 py-1 rounded">Restart</button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML += html;
        });
    });
}

function sendAction(service, action){
    fetch('/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ service, action })
    }).then(() => loadServices());
}

setInterval(loadServices, 5000);
loadServices();
</script>

</body>
</html>
