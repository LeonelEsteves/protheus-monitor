<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='logo/gamb-logo.png') }}">
<script>
window.tailwind = window.tailwind || {};
window.tailwind.config = { darkMode: "class" };
document.documentElement.classList.add("dark");
</script>
<script src="{{ url_for('static', filename='vendor/tailwindcss.js') }}"></script>
<title>InventÃ¡rio de Servidores | GAMB</title>
<style>
    .button-highlight-primary { background: #2563eb; border: 1px solid #1d4ed8; color: #fff; }
    .button-highlight-primary:hover { background: #1d4ed8; border-color: #1e40af; }
    .button-highlight-secondary { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }
    .button-highlight-secondary:hover { background: #dbeafe; border-color: #93c5fd; }
    .button-highlight-neutral { background: #0f172a; border: 1px solid #1e293b; color: #fff; }
    .button-highlight-neutral:hover { background: #1e293b; border-color: #334155; }
function escapeHtml(value) {
    return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}
async function apiFetch(url, options = {}) {
    if (inventoryPageLeaving) {
        return null;
    }
    let response;
    try { response = await fetch(url, options); } catch (error) {
        if (inventoryPageLeaving || (error && error.name === "AbortError")) {
            return null;
        }
        return { response: { ok: false, status: 0 }, data: { success: false, error: "Falha de rede ao chamar a API.", details: String(error || "") } };
    }
    if (response.status === 401) { window.location.href = "/login"; return null; }
    const contentType = String(response.headers.get("content-type") || "").toLowerCase();
    if (!contentType.includes("application/json")) {
        const text = await response.text().catch(() => "");
        return { response, data: { success: false, error: "Resposta invÃ¡lida do servidor.", details: text.slice(0, 1500) } };
    }
    return { response, data: await response.json() };
}
async function logout() {
    const result = await apiFetch("/logout", { method: "POST" });
    if (result && result.data.success) window.location.href = "/login";
}
function normalizeSearchText(value) {
    return String(value || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}
function formatInventoryDate(value) { return String(value || "").trim() || "NÃ£o informado"; }
function formatBytesToGb(value) {
    const numericValue = Number(value);
    if (!Number.isFinite(numericValue) || numericValue < 0) return "-";
    return `${(numericValue / (1024 ** 3)).toFixed(1)} GB`;
}
function buildInventoryDiskList(disks) {
    if (!Array.isArray(disks) || !disks.length) {
        return '<div class="rounded-2xl border border-dashed border-slate-300 px-4 py-3 text-sm text-slate-500">Nenhuma unidade de disco disponÃ­vel foi retornada.</div>';
    }
    return disks.map((disk) => {
        return `
            <div class="rounded-2xl border border-slate-200 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-900/70">
                <div class="flex flex-wrap items-center justify-between gap-2">
                    <div class="text-sm font-semibold text-slate-900 dark:text-slate-100">${escapeHtml(disk.drive || "Disco")}${disk.volume_name ? ` - ${escapeHtml(disk.volume_name)}` : ""}</div>
                    <div class="text-sm font-medium text-emerald-600 dark:text-emerald-300">Livre: ${formatBytesToGb(disk.free_bytes)}</div>
                </div>
            </div>`;
    }).join("");
}
function getFilteredItems() {
    const payload = inventoryState.payload || {};
    const items = Array.isArray(payload.items) ? payload.items : [];
    const filterValue = normalizeSearchText(document.getElementById("serverFilter").value || "");
    return items.filter((item) => {
        const text = `${item.device_name || ""} ${item.server || ""} ${(item.ip_addresses || []).join(" ")}`;
        return !filterValue || normalizeSearchText(text).includes(filterValue);
    });
}
function renderTabs(items) {
    const container = document.getElementById("inventoryTabs");
    if (!container) return;
    if (!items.length) { container.innerHTML = ""; return; }
    if (activeTab >= items.length) activeTab = 0;
    container.innerHTML = items.map((item, index) => {
        const isActive = index === activeTab;
        const label = item.device_name || item.server || `Servidor ${index + 1}`;
        const icon = item.status === "error" ? "!" : "Srv";
        return `<button type="button" onclick="activeTab=${index}; renderInventory();" class="${isActive ? 'inventory-tab-active bg-slate-900 text-white' : 'inventory-tab bg-white text-slate-700'} inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold"><span>${icon}</span><span>${escapeHtml(label)}</span></button>`;
    }).join("");
}
function renderInventory() {
    const summary = document.getElementById("inventorySummary");
    const content = document.getElementById("inventoryContent");
    const tabs = document.getElementById("inventoryTabs");
    const items = getFilteredItems();

    if (!servers.length) {
        summary.textContent = "Nenhum servidor cadastrado. Cadastre os IPs na Ã¡rea administrativa antes de usar esta tela.";
        tabs.innerHTML = "";
        content.innerHTML = "";
        return;
    }
    if (inventoryState.loading && !inventoryState.payload) {
        summary.textContent = "Coletando inventÃ¡rio dos servidores cadastrados...";
        content.innerHTML = '<div class="rounded-2xl border border-slate-200 bg-white p-5 text-sm text-slate-500 dark:border-slate-700 dark:bg-slate-900/70 dark:text-slate-300">Consulta em execuÃ§Ã£o. Aguarde alguns instantes...</div>';
        tabs.innerHTML = "";
        return;
    }
    if (!inventoryState.payload) {
        summary.textContent = "Clique em atualizar inventÃ¡rio para consultar os servidores cadastrados.";
        content.innerHTML = "";
        tabs.innerHTML = "";
        return;
    }

    const payload = inventoryState.payload;
    const allItems = Array.isArray(payload.items) ? payload.items : [];
    const successCount = allItems.filter((item) => item.status === "success").length;
    const errorCount = allItems.filter((item) => item.status === "error").length;
    summary.innerHTML = `<div class="flex flex-wrap items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
        <span class="inline-flex items-center rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-300">${successCount} servidor(es) consultado(s)</span>
        <span class="inline-flex items-center rounded-full bg-rose-100 px-3 py-1 text-xs font-semibold text-rose-700 dark:bg-rose-500/15 dark:text-rose-300">${errorCount} falha(s)</span>
        <span class="inline-flex items-center rounded-full bg-slate-200 px-3 py-1 text-xs font-semibold text-slate-700 dark:bg-slate-700 dark:text-slate-200">Ãšltima coleta: ${escapeHtml(formatInventoryDate(payload.generated_at))}</span>
    </div>`;

    if (!items.length) {
        tabs.innerHTML = "";
        content.innerHTML = '<div class="rounded-2xl border border-dashed border-slate-300 px-4 py-3 text-sm text-slate-500">Nenhum servidor encontrado para o filtro informado.</div>';
        return;
    }

    renderTabs(items);
    const item = items[activeTab] || items[0];
    if (!item) return;

    if (item.status === "error") {
        content.innerHTML = `
            <div class="rounded-2xl border border-rose-200 bg-rose-50 p-5 dark:border-rose-500/30 dark:bg-rose-500/10">
                <div class="flex items-center justify-between gap-3">
                    <div>
                        <div class="text-lg font-semibold text-rose-700 dark:text-rose-300">${escapeHtml(item.server || item.connect_host || "Servidor")}</div>
                        <div class="mt-1 text-sm text-rose-600 dark:text-rose-200">Falha ao coletar o inventÃ¡rio remoto.</div>
                    </div>
                    <span class="inline-flex rounded-full bg-rose-100 px-3 py-1 text-xs font-semibold text-rose-700 dark:bg-rose-500/20 dark:text-rose-200">Erro</span>
                </div>
                <div class="mt-4 space-y-2 text-sm text-rose-700 dark:text-rose-100">
                    <div><span class="font-semibold">Detalhe:</span> ${escapeHtml(item.error || "Falha desconhecida.")}</div>
                    ${Array.isArray(item.tried_hosts) && item.tried_hosts.length ? `<div><span class="font-semibold">Tentativas:</span> ${escapeHtml(item.tried_hosts.join(", "))}</div>` : ""}
                    ${item.hint ? `<div><span class="font-semibold">Dica:</span> ${escapeHtml(item.hint)}</div>` : ""}
                </div>
            </div>`;
        return;
    }

    const ipAddresses = Array.isArray(item.ip_addresses) && item.ip_addresses.length ? item.ip_addresses.map((ip) => escapeHtml(ip)).join(", ") : escapeHtml(item.server || "NÃ£o informado");
    const pendingBadge = item.has_pending_updates === null
        ? '<span class="inline-flex rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold text-amber-700 dark:bg-amber-500/20 dark:text-amber-200">PendÃªncia nÃ£o verificada</span>'
        : item.has_pending_updates
            ? `<span class="inline-flex rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold text-amber-700 dark:bg-amber-500/20 dark:text-amber-200">${Number(item.pending_update_count || 0)} atualizaÃ§Ã£o(Ãµes) pendente(s)</span>`
            : '<span class="inline-flex rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-300">Sem atualizaÃ§Ãµes pendentes</span>';

    const statusUpdatesText = item.has_pending_updates === null
        ? escapeHtml(item.pending_updates_error || "NÃ£o foi possÃ­vel verificar atualizaÃ§Ãµes pendentes.")
        : item.has_pending_updates
            ? `${Number(item.pending_update_count || 0)} atualizaÃ§Ã£o(Ãµes) aguardando instalaÃ§Ã£o`
            : "Windows atualizado";

    content.innerHTML = `
        <div class="space-y-4">
            <div class="rounded-2xl border border-slate-200 bg-white p-5 dark:border-slate-700 dark:bg-slate-900/70">
                <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
                    <div>
                        <div class="text-lg font-semibold text-slate-900 dark:text-slate-100">${escapeHtml(item.device_name || item.server || "Servidor")}</div>
                        <div class="mt-1 text-sm text-slate-500 dark:text-slate-400">IP do servidor: ${ipAddresses}</div>
                    </div>
                    ${pendingBadge}
                </div>
                <div class="mt-4 grid gap-3 text-sm text-slate-700 dark:text-slate-200 md:grid-cols-2">
                    <div class="rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-800/80">
                        <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500 dark:text-slate-400">Nome do servidor</div>
                        <div class="mt-1">${escapeHtml(item.device_name || item.server || "Servidor")}</div>
                    </div>
                    <div class="rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-800/80">
                        <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500 dark:text-slate-400">IP do servidor</div>
                        <div class="mt-1">${ipAddresses}</div>
                    </div>
                    <div class="rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-800/80 md:col-span-2">
                        <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500 dark:text-slate-400">AtualizaÃ§Ãµes pendentes</div>
                        <div class="mt-1">${statusUpdatesText}</div>
                    </div>
                </div>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 dark:border-slate-700 dark:bg-slate-900/70">
                <div class="mb-3 text-sm font-semibold text-slate-900 dark:text-slate-100">EspaÃ§o livre em disco</div>
                <div class="space-y-3">${buildInventoryDiskList(item.disks)}</div>
            </div>
        </div>`;
}
async function loadServers() {
    const result = await apiFetch("/servers");
    if (!result) return;
    const payload = result.data || {};
    servers = Array.isArray(payload.servers) ? payload.servers : [];
}
async function loadInventory(forceRefresh = false) {
    if (inventoryState.loading) return;
    if (inventoryFetchController) {
        try { inventoryFetchController.abort(); } catch (error) {}
    }
    inventoryFetchController = new AbortController();
    inventoryState.loading = true;
    renderInventory();
    const query = forceRefresh ? "?refresh=1" : "";
    const result = await apiFetch(`/servers/inventory${query}`, { signal: inventoryFetchController.signal });
    inventoryState.loading = false;
    inventoryFetchController = null;
    if (!result) { renderInventory(); return; }
    if (!result.response.ok || !result.data.success) {
        if (inventoryPageLeaving) return;
        inventoryState.payload = {
            items: Array.isArray(result.data?.items) ? result.data.items : [],
            steps: Array.isArray(result.data?.steps) && result.data.steps.length ? result.data.steps : [result.data?.error || "NÃ£o foi possÃ­vel carregar o inventÃ¡rio dos servidores."],
            generated_at: result.data?.generated_at || "",
            cached: false,
        };
        renderInventory();
        if (forceRefresh) {
            showToast(result.data?.error || "NÃ£o foi possÃ­vel carregar o inventÃ¡rio dos servidores.");
        }
        return;
    }
    inventoryState.payload = result.data || {};
    activeTab = 0;
    renderInventory();
    if (forceRefresh) showToast("InventÃ¡rio dos servidores atualizado com sucesso.", "success");
}
document.getElementById("serverFilter").addEventListener("input", function () { activeTab = 0; renderInventory(); });
window.addEventListener("beforeunload", function () {
    inventoryPageLeaving = true;
    if (inventoryFetchController) {
        try { inventoryFetchController.abort(); } catch (error) {}
    }
});
window.addEventListener("pagehide", function () {
    inventoryPageLeaving = true;
    if (inventoryFetchController) {
        try { inventoryFetchController.abort(); } catch (error) {}
    }
});
renderInventory();
loadServers().then(function () { return loadInventory(false); });
</script>
</body>
</html>
